<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Share your feedback and suggestions to help improve Routines and Habits.">
    <title>Feedback | Routines &amp; Habits</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="banner banner-feedback">
        
        <h1>Feedback</h1>
        <p>Your thoughts help improve this website.</p>
    </div>
    <nav>
        <div class="nav-container">
            <a href="index.html">Home</a>
            <a href="routines.html">Daily Routines</a>
            <a href="study.html">Study Habits</a>
            <a href="time.html">Time Management</a>
            <a href="feedback.html" class="active">Feedback</a>
            <a href="about.html">About</a>
        </div>
    </nav>
</header>

<main>
    <h1>Student Feedback Form</h1>
    <p>Have a study method that works for you? Or a suggestion for the site? Fill in the form below. All fields marked with <span class="required-star">*</span> are required.</p>

    <form action="#" method="post" class="feedback-form">

        <div class="form-group">
            <label for="name">Full Name <span class="required-star">*</span></label>
            <input type="text" id="name" name="name" required minlength="2" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label for="email">Student Email <span class="required-star">*</span></label>
            <input type="email" id="email" name="email" required placeholder="student@college.ac.bw">
        </div>

        <div class="form-group">
            <label for="topic">Topic of Interest <span class="required-star">*</span></label>
            <select id="topic" name="topic" required>
                <option value="">-- Please choose a topic --</option>
                <option value="routines">Daily Routines</option>
                <option value="study">Study Habits</option>
                <option value="time">Time Management</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="rating">Rate This Website (1–5) <span class="required-star">*</span></label>
            <input type="number" id="rating" name="rating" min="1" max="5" required placeholder="Enter a number from 1 to 5">
        </div>

        <div class="form-group">
            <label for="message">Your Suggestions <span class="required-star">*</span></label>
            <textarea id="message" name="message" rows="5" required minlength="10" placeholder="Share your thoughts, suggestions, or study tips..."></textarea>
        </div>

        <button type="submit" class="submit-btn">Submit Feedback</button>

    </form>
</main>

<footer>
    <p>&copy; 2026 Routines &amp; Habits</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFoAAAgxQT4MnBIa6pUSHJlN83" crossorigin="anonymous"></script>
</body>
</html>
